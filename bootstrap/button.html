<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>table</title>
    <link rel="stylesheet" href="http://cdn.bootcss.com/bootstrap/3.1.1/css/bootstrap.min.css">
</head>

<body>
<button class="btn" type="button">基础按钮.btn</button>
<button class="btn btn-default" type="button">默认按钮.btn-default</button>
<button class="btn btn-primary" type="button">主要按钮.btn-primary</button>
<button class="btn btn-success" type="button">成功按钮.btn-success</button>
<button class="btn btn-info" type="button">信息按钮.btn-info</button>
<button class="btn btn-warning" type="button">警告按钮.btn-warning</button>
<button class="btn btn-danger" type="button">危险按钮.btn-danger</button>
<button class="btn btn-link" type="button">链接按钮.btn-link</button>
<button class="btn-block btn-primary btn-lg" type="button">大型按钮.btn-lg</button>
<button class="btn btn-primary btn-block " type="button" disabled>大型按钮.btn-lg</button>
<button class="btn btn-primary btn-block disabled" type="button">大型按钮.btn-lg</button>
<button class="btn-block btn-success " type="button">正常按钮</button>
<button class="btn btn-info btn-sm" type="button">小型按钮.btn-sm</button>
<button class="btn btn-warning btn-xs" type="button">超小型按钮.btn-xs</button>

<div>
    <!-- http://getbootstrap.com/components/#glyphicons-->
    <span class="glyphicon glyphicon-search"></span>
    <span class="glyphicon glyphicon-asterisk"></span>
    <span class="glyphicon glyphicon-plus"></span>
    <span class="glyphicon glyphicon-cloud"></span>
</div>

<div class="container">
    <div class="row">
        <div class="col-sm-4">
            <img alt="140x140" src="http://placehold.it/140x140">

            <div>默认图片</div>
        </div>
        <div class="col-sm-4">
            <img class="img-rounded" alt="140x140" src="http://placehold.it/140x140">

            <div>圆角图片</div>
        </div>
        <div class="col-sm-4">
            <img class="img-circle" alt="140x140" src="http://placehold.it/140x140">

            <div>圆形图片</div>
        </div>
        <div class="row">
            <div class="col-sm-6">
                <img class="img-thumbnail" alt="140x140" src="http://placehold.it/140x140">

                <div>缩略图</div>
            </div>
            <div class="col-sm-6">
                <img class="img-responsive" alt="140x140" src="http://placehold.it/140x140"/>

                <div>响应式图片</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
