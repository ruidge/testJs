<!DOCTYPE HTML>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>下拉菜单</title>
    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dropdown"> <!--点击的时候在dropdown 和 dropdown open之间切换-->
    <button class="btn btn-default dropdown-toggle" type="button" id="dropdownMenu1" data-toggle="dropdown">
        水果
        <span class="caret"></span>
    </button>
    <ol class="dropdown-menu" role="menu" aria-labelledby="dropdownMenu1">
        <li role="presentation" class="dropdown-header">第一部分菜单头部</li>
        <li role="presentation" class="active"><a role="menuitem" tabindex="-1" href="#">苹果</a></li>
        <li role="presentation"><a role="menuitem" tabindex="-1" href="#">香蕉</a></li>
        <li role="presentation"><a role="menuitem" tabindex="-1" href="#">梨</a></li>
        <li role="presentation" class="disabled"><a role="menuitem" tabindex="-1" href="#">水蜜桃</a></li>
        <li role="presentation" class="divider"></li>
        <li role="presentation" class="dropdown-header">第二部分菜单头部</li>
        <li role="presentation"><a role="menuitem" tabindex="-1" href="#">苹果</a></li>
        <li role="presentation"><a role="menuitem" tabindex="-1" href="#">香蕉</a></li>
        <li role="presentation"><a role="menuitem" tabindex="-1" href="#">梨</a></li>
        <!--<li role="presentation" class="divider"></li>-->
        <li role="presentation"><a role="menuitem" tabindex="-1" href="#">水蜜桃</a></li>
    </ol>
</div>
<script src="http://libs.baidu.com/jquery/1.9.0/jquery.js"></script>
<script src="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/js/bootstrap.min.js"></script>
</body>
</html>
