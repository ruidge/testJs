<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <script src="http://libs.baidu.com/jquery/1.9.0/jquery.js" type="text/javascript"></script>
    <title>jQuery动画特效</title>
</head>
<body>
<div id="div" style="position: relative; display: block;background-color: blue;width: 20%;height: 200px"></div>
<input type="button" style="display:block;margin-top: 20px" id="bt1" value="右移"/>
<input type="button" style="display:block;margin-top: 20px" id="bt2" value="左移"/>

<script type="text/javascript">
    var inAnim = false;
    $(function () {
        $("#bt1").bind("click", function () {
            $("#div").stop(false,true);
            $("#div").animate({left: "+=20%"},2000);
        });
        $("#bt2").bind("click", function () {
            $("#div").stop(false,true);
            $("#div").animate({left: "-=20%"},2000);
        });
    });

</script>
</body>
</html>
