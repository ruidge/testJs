<!DOCTYPE html>
<html>
<head>
    <title>初识jQuery</title>
    <meta charset="UTF-8">
    <script src="http://libs.baidu.com/jquery/1.9.0/jquery.js" type="text/javascript"></script>
    <!--<link href="1.css" rel="stylesheet" type="text/css" />-->
</head>

<body>
<ul>
    <li>1111111111111111</li>
    <li>2222222222222222</li>
    <li>3333333333333333</li>
    <li>4444444444444444</li>
    <li>5555555555555555</li>
    <li id="li6" style="display:none">6666666666666666</li>
    <li id="li7" style="display:none">7777777777777777</li>
    <a href="javascript:void(0)" onclick="bclick()"></a>
</ul>
<!--css只能改style里的属性-->
<!--attr可以改元素所有的属性.id,name,style.什么都行-->

<script type="text/javascript">
    var show="更多";
    var hide="隐藏";
    function bclick() {
    var li6 = $("#li6");
    var li7 = $("#li7");
    var a = $("a");
        if(a.html() == show){
            a.html(hide);
            li6.css("display","");
            li7.css("display","");
        }else{
            a.html(show);
            li6.css("display","none");
            li7.css("display","none");
        }
    }
    bclick();
</script>
</body>
</html>
